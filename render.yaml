# Render.com one-click deploy config (Python / FastAPI)
# https://render.com/docs/blueprint-spec

services:
  # Renamed from daemu-api so Render Blueprint creates a fresh Python service
  # instead of requiring manual approval to flip the existing Node service's
  # runtime. Old daemu-api can be deleted from the dashboard once this is live.
  - type: web
    name: daemu-py
    runtime: python
    rootDir: backend-py
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: RESEND_API_KEY
        sync: false   # set in Render dashboard (secret)
      - key: JWT_SECRET
        generateValue: true   # Render generates and stores a strong secret
      - key: ADMIN_EMAIL
        value: admin@daemu.kr
      - key: ADMIN_PASSWORD
        sync: false   # set in Render dashboard (secret) — first-boot seed only
      - key: DATABASE_URL
        # Default: SQLite file in the service container.
        # On Cafe24 / production, override to mysql+asyncmy://user:pass@host:3306/daemu
        value: sqlite+aiosqlite:///./daemu.db
      - key: ALLOWED_ORIGINS
        value: https://juyoungjun.github.io,http://localhost:8765,http://localhost:5173,http://localhost:8766
      - key: FROM_EMAIL
        value: DAEMU <onboarding@resend.dev>
      - key: PYTHON_VERSION
        value: 3.12.7
