name: Keep Render warm

# Render free tier 는 15분간 트래픽이 없으면 dyno 를 sleep 상태로 내립니다.
# sleep 후 첫 요청은 cold-start 로 30초+ 지연 + 그 동안 사용자에게 503/타임아웃이
# 보일 수 있습니다.
#
# 안전성을 높이기 위해 *5분* cron 으로 변경했습니다 (이전 10분):
#   - GitHub Actions cron 은 ±5분 변동이 있어, 10분 간격이면 최악의 경우
#     15분 sleep 임계를 살짝 넘길 수 있었음.
#   - 5분 cron 은 ±5분 드리프트가 있어도 최대 10분 안에는 ping 이 들어가
#     sleep 임계 15분에 절대 닿지 않음.
#
# 운영 단계 (카페24 VPS) 로 이전한 후에는 이 워크플로를 비활성화해도 됩니다.
# 비활성화 방법: GitHub repo Settings → Actions → Disable workflow.
#
# GitHub Actions 비용:
#   - public repo: 무제한 무료
#   - private repo: 월 2,000분 무료 (5분 cron 1회 ~10초 → 약 48분/일 = 1440분/월)
#
# 트래픽 부담:
#   - /api/health 는 단순 dict 반환, DB ping 1회. 부하 무시 가능.

on:
  schedule:
    # 매 5분마다 (UTC 기준). drift 를 감안해도 sleep 임계(15분)에 절대 닿지 않게.
    - cron: '*/5 * * * *'
  workflow_dispatch:    # 수동 실행도 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping backend health endpoint (cold-start 대비 60s 까지 재시도)
        run: |
          set -e
          # 첫 요청이 cold-start 면 최대 60초까지 기다림
          for i in 1 2 3 4 5 6; do
            if curl -fsSL --max-time 30 https://daemu-py.onrender.com/api/health > /tmp/health.json; then
              echo "health OK on attempt $i"
              cat /tmp/health.json
              exit 0
            fi
            echo "attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "::warning::backend health failed after 6 attempts (cold-start may have exceeded 60s)"
          exit 0   # workflow 는 실패시키지 않음 (다음 ping 이 또 시도)

      - name: Touch /api/health 1회 더 (방금 깨운 dyno 안정화)
        run: |
          sleep 5
          curl -fsSL --max-time 10 https://daemu-py.onrender.com/api/health > /dev/null \
            && echo "second ping OK" || echo "::warning::second ping failed"

      - name: GitHub Pages 도 함께 워밍 (CDN 캐시 유지)
        run: |
          curl -fsSL --max-time 15 https://juyoungjun.github.io/daemu-website/ > /dev/null \
            && echo "pages OK" || echo "::warning::pages reachability check failed"
