# Render.com one-click deploy config (Python / FastAPI)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: daemu-api
    runtime: python
    rootDir: backend-py
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: RESEND_API_KEY
        sync: false   # set in Render dashboard (secret)
      - key: ALLOWED_ORIGINS
        value: https://juyoungjun.github.io,http://localhost:8765,http://localhost:5173
      - key: FROM_EMAIL
        value: DAEMU <onboarding@resend.dev>
      - key: PYTHON_VERSION
        value: 3.12.7
