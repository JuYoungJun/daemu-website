# /etc/nginx/sites-available/daemu
#
# 프론트(SPA) + 백엔드(/api/, /r/, /health) 동일 도메인 서빙. CORS 우회 + cookie
# scope 단순화. 도메인 placeholder: example.daemu.kr → 실제 도메인으로 sed.
#
# 첫 부팅 시엔 80 (HTTP) 만 listen → certbot 발급 후 443 (HTTPS) 자동 추가.
# 아래는 certbot 적용 후의 최종 형태. 처음엔 server_name 만 맞고 나머지는
# certbot --nginx 가 자동 채움.

# ── HTTP → HTTPS 강제 redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name example.daemu.kr www.example.daemu.kr;

    # certbot HTTP-01 challenge 만 80 으로 받음
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 그 외 모두 HTTPS 로 redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 메인 ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.daemu.kr www.example.daemu.kr;

    # ── TLS — certbot 발급 후 경로 자동 채움. 발급 전엔 self-signed dummy 또는
    # 80 only 로 시작 가능.
    ssl_certificate     /etc/letsencrypt/live/example.daemu.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.daemu.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── 보안 헤더 ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP — 동일 도메인 SPA + Resend (서버측 outbound 만이므로 헤더에는 불필요)
    # connect-src 에 ipapi.co (GeoIP 프록시 fallback), 외부 폰트는 admin 에서만.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://api.example.daemu.kr https://ipapi.co; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # 업로드 한도 — PDF 25MB + 영상 50MB 까지 여유.
    client_max_body_size 60m;
    client_body_buffer_size 256k;
    client_body_timeout 60s;
    keepalive_timeout 65;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

    # ── 정적 파일 루트 (Vite dist/) ───────────────────────────────
    root /srv/daemu/frontend;
    index index.html;

    # ── 백엔드 reverse proxy ──────────────────────────────────────
    # /api/, /r/{short_id}, /api/health, /sign/{token} 모두 같은 backend.
    location ~ ^/(api|r|sign|health)(/|$) {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # WebSocket forward (추후 wss 추가 시)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_connect_timeout 10s;
    }

    # ── /uploads/ — backend 업로드 파일을 nginx 가 직접 서빙 ──────
    # backend 의 X-Accel-Redirect 또는 직접 read endpoint 보다 빠르고 안전.
    location /uploads/ {
        alias /srv/daemu/uploads/;
        autoindex off;
        # 7일 캐시 (immutable — 업로드된 파일은 동일 URL 에 동일 내용)
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        # 업로드 파일은 iframe embed 차단 (XSS 방지)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        # 실행 가능한 확장자 차단 (업로드된 .html/.svg 가 same-origin 으로 실행되는 것 방지)
        location ~* \.(html|htm|svg|xml|js|mjs|wasm)$ {
            add_header Content-Disposition 'attachment' always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ── SPA: 정적 자산은 long-cache, index.html 은 no-cache ────────
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # SPA 라우팅 fallback — 그 외 모두 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── deny 패턴 (정보 노출 차단) ────────────────────────────────
    location ~ /\.(git|env|hg|svn|bzr) { deny all; }
    location = /backend-py    { return 403; }
    location ~ ^/(\.env|\.git) { deny all; }
}
